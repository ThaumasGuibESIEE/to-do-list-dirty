name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: todo.settings
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-linux-signing-keyring.gpg
          echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-signing-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main' | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django selenium fpdf coverage ruff

      - name: Install Node dependencies
        run: npm ci

      - name: Lint (ruff)
        run: ruff check .

      - name: Django tests (JSON)
        run: python scripts/run_tests_json.py

      - name: Selenium end-to-end tests (JSON)
        run: |
          python manage.py migrate --noinput
          python manage.py loaddata tasks/fixtures/dataset.json
          python manage.py runserver 0.0.0.0:8000 --noreload --insecure >/tmp/django.log 2>&1 &
          SERVER_PID=$!
          python - <<'PY'
import socket, time
deadline = time.time() + 30
while time.time() < deadline:
    with socket.socket() as s:
        try:
            s.connect(("127.0.0.1", 8000))
            break
        except OSError:
            time.sleep(0.5)
else:
    raise SystemExit("Server did not start")
PY
          APP_URL=http://127.0.0.1:8000 HEADLESS=1 python scripts/sele.py
          kill $SERVER_PID

      - name: Accessibility tests (pa11y)
        run: bash scripts/run_a11y.sh

      - name: Test report
        run: python test_report.py > ci_test_report.txt

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            result_test_auto.json
            result_test_selenium.json
            result_test_a11y.json
            ci_test_report.txt

      - name: Comment PR with test report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('ci_test_report.txt', 'utf8');
            const manualLine = report.split('\n').find((line) =>
              line.toLowerCase().includes('manual tests to do')
            );
            const body = [
              '### CI Test Report',
              '```',
              report.trim(),
              '```',
              manualLine ? `**Tests manuels restants :** ${manualLine.trim()}` : ''
            ].filter(Boolean).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
